<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniChrome</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }
    .header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    .header .version { font-size: 11px; color: #666; }
    .status { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #16213e; border-radius: 8px; margin-bottom: 12px; }
    .status .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.connected { background: #4ade80; }
    .dot.disconnected { background: #f87171; }
    .status .label { font-size: 13px; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-bottom: 8px; transition: background 0.2s; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:hover { background: #5558e6; }
    .btn-secondary { background: #16213e; color: #e0e0e0; border: 1px solid #333; }
    .btn-secondary:hover { background: #1a2744; }
    .provider-list { margin-top: 12px; }
    .provider-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #16213e; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
    .provider-item .name { font-weight: 500; }
    .provider-item .status-text { font-size: 11px; }
    .provider-item .status-text.active { color: #4ade80; }
    .provider-item .status-text.inactive { color: #666; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./Popup.tsx"></script>
</body>
</html>
